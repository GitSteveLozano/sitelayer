services:
  api:
    image: ${APP_IMAGE:-registry.digitalocean.com/sitelayer/sitelayer:main}
    command: npm start -w @sitelayer/api
    environment:
      NODE_ENV: production
      APP_TIER: ${APP_TIER:-prod}
      FEATURE_FLAGS: ${FEATURE_FLAGS:-}
      PORT: '3001'
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_PROD_RO: ${DATABASE_URL_PROD_RO:-}
      DATABASE_SSL_REJECT_UNAUTHORIZED: ${DATABASE_SSL_REJECT_UNAUTHORIZED:-true}
      ACTIVE_COMPANY_SLUG: ${ACTIVE_COMPANY_SLUG:-la-operations}
      ACTIVE_USER_ID: ${ACTIVE_USER_ID:-demo-user}
      QBO_CLIENT_ID: ${QBO_CLIENT_ID:-}
      QBO_CLIENT_SECRET: ${QBO_CLIENT_SECRET:-}
      QBO_REDIRECT_URI: ${QBO_REDIRECT_URI:-http://localhost:3001/api/integrations/qbo/callback}
      QBO_SUCCESS_REDIRECT_URI: ${QBO_SUCCESS_REDIRECT_URI:-http://localhost:3000/?qbo=connected}
      QBO_ENVIRONMENT: ${QBO_ENVIRONMENT:-sandbox}
      QBO_BASE_URL: ${QBO_BASE_URL:-}
      QBO_STATE_SECRET: ${QBO_STATE_SECRET:-}
      QBO_WEBHOOK_VERIFIER: ${QBO_WEBHOOK_VERIFIER:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      DO_SPACES_KEY: ${DO_SPACES_KEY:-}
      DO_SPACES_SECRET: ${DO_SPACES_SECRET:-}
      DO_SPACES_REGION: ${DO_SPACES_REGION:-tor1}
      DO_SPACES_ENDPOINT: ${DO_SPACES_ENDPOINT:-https://tor1.digitaloceanspaces.com}
      DO_SPACES_BUCKET: ${DO_SPACES_BUCKET:-sitelayer-blueprints-prod}
      ALLOW_LOCAL_BLUEPRINT_STORAGE_IN_PROD: ${ALLOW_LOCAL_BLUEPRINT_STORAGE_IN_PROD:-}
      BLUEPRINT_STORAGE_ROOT: ${BLUEPRINT_STORAGE_ROOT:-/app/storage/blueprints}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      SENTRY_ORG: ${SENTRY_ORG:-sandolabs}
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      DEBUG_TRACE_TOKEN: ${DEBUG_TRACE_TOKEN:-}
      DEBUG_ALLOW_PROD: ${DEBUG_ALLOW_PROD:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      CLERK_JWT_KEY: ${CLERK_JWT_KEY:-}
      CLERK_ISSUER: ${CLERK_ISSUER:-}
      CLERK_WEBHOOK_SECRET: ${CLERK_WEBHOOK_SECRET:-}
      INTERNAL_AUTH_TOKEN: ${INTERNAL_AUTH_TOKEN:-}
      AUTH_ALLOW_HEADER_FALLBACK: ${AUTH_ALLOW_HEADER_FALLBACK:-}
      AUTH_ALLOW_HEADER_FALLBACK_BREAK_GLASS: ${AUTH_ALLOW_HEADER_FALLBACK_BREAK_GLASS:-}
      API_METRICS_TOKEN: ${API_METRICS_TOKEN:-}
      SITELAYER_ENV_ENFORCE: ${SITELAYER_ENV_ENFORCE:-}
      APP_BUILD_SHA: ${GIT_SHA:-unknown}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@sitelayer.sandolab.xyz}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SHUTDOWN_TIMEOUT_MS: ${SHUTDOWN_TIMEOUT_MS:-15000}
    volumes:
      - blueprint_storage:/app/storage/blueprints
    restart: always
    stop_grace_period: 20s
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '5'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('node:http').get('http://127.0.0.1:3001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - sitelayer

  web:
    image: ${APP_IMAGE:-registry.digitalocean.com/sitelayer/sitelayer:main}
    command: npm start -w @sitelayer/web
    environment:
      NODE_ENV: production
    restart: always
    stop_grace_period: 20s
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '5'
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('node:http').get('http://127.0.0.1:3000/',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - sitelayer

  worker:
    image: ${APP_IMAGE:-registry.digitalocean.com/sitelayer/sitelayer:main}
    command: npm start -w @sitelayer/worker
    environment:
      NODE_ENV: production
      APP_TIER: ${APP_TIER:-prod}
      FEATURE_FLAGS: ${FEATURE_FLAGS:-}
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_PROD_RO: ${DATABASE_URL_PROD_RO:-}
      DATABASE_SSL_REJECT_UNAUTHORIZED: ${DATABASE_SSL_REJECT_UNAUTHORIZED:-true}
      QBO_CLIENT_ID: ${QBO_CLIENT_ID:-}
      QBO_CLIENT_SECRET: ${QBO_CLIENT_SECRET:-}
      QBO_BASE_URL: ${QBO_BASE_URL:-https://sandbox-quickbooks.api.intuit.com}
      QBO_LIVE_ESTIMATE_PUSH: ${QBO_LIVE_ESTIMATE_PUSH:-0}
      QBO_LIVE_RENTAL_INVOICE: ${QBO_LIVE_RENTAL_INVOICE:-0}
      QBO_RENTAL_INCOME_ACCOUNT_ID: ${QBO_RENTAL_INCOME_ACCOUNT_ID:-}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_WORKER_DSN: ${SENTRY_WORKER_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-production}
      SENTRY_TRACES_SAMPLE_RATE: ${SENTRY_TRACES_SAMPLE_RATE:-0.1}
      SENTRY_ORG: ${SENTRY_ORG:-sandolabs}
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      DEBUG_TRACE_TOKEN: ${DEBUG_TRACE_TOKEN:-}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      APP_BUILD_SHA: ${GIT_SHA:-unknown}
      EMAIL_PROVIDER: ${EMAIL_PROVIDER:-console}
      EMAIL_FROM: ${EMAIL_FROM:-noreply@sitelayer.sandolab.xyz}
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      NOTIFICATIONS_ENABLED: ${NOTIFICATIONS_ENABLED:-1}
      NOTIFICATION_BATCH_LIMIT: ${NOTIFICATION_BATCH_LIMIT:-50}
      NOTIFICATION_MAX_ATTEMPTS: ${NOTIFICATION_MAX_ATTEMPTS:-5}
      NOTIFICATION_PROVIDER_FAILURE_THRESHOLD: ${NOTIFICATION_PROVIDER_FAILURE_THRESHOLD:-3}
      CLERK_EMAIL_CACHE_TTL_MS: ${CLERK_EMAIL_CACHE_TTL_MS:-300000}
      SHUTDOWN_TIMEOUT_MS: ${SHUTDOWN_TIMEOUT_MS:-15000}
    restart: always
    stop_grace_period: 20s
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '5'
    healthcheck:
      test: ['CMD-SHELL', "test -r /proc/1/cmdline && tr '\\0' ' ' </proc/1/cmdline | grep -Eq 'npm|node|worker'"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - sitelayer

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    logging:
      driver: json-file
      options:
        max-size: '20m'
        max-file: '5'
    networks:
      - sitelayer
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy

networks:
  sitelayer:
    driver: bridge

volumes:
  blueprint_storage:
  caddy_data:
  caddy_config:
