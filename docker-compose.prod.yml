services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_COMPANY_SLUG: ${VITE_COMPANY_SLUG:-la-operations}
        VITE_USER_ID: ${VITE_USER_ID:-demo-user}
        VITE_APP_TIER: ${VITE_APP_TIER:-prod}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_ENVIRONMENT: ${VITE_SENTRY_ENVIRONMENT:-production}
        VITE_SENTRY_RELEASE: ${VITE_SENTRY_RELEASE:-}
        VITE_SENTRY_TRACES_SAMPLE_RATE: ${VITE_SENTRY_TRACES_SAMPLE_RATE:-0.1}
        VITE_SENTRY_REPLAYS_SESSION_SAMPLE_RATE: ${VITE_SENTRY_REPLAYS_SESSION_SAMPLE_RATE:-0.1}
        VITE_SENTRY_REPLAYS_ON_ERROR_SAMPLE_RATE: ${VITE_SENTRY_REPLAYS_ON_ERROR_SAMPLE_RATE:-1.0}
        SENTRY_ORG: ${SENTRY_ORG:-sandolabs}
        SENTRY_WEB_PROJECT: ${SENTRY_WEB_PROJECT:-sitelayer-web}
        SENTRY_RELEASE: ${SENTRY_RELEASE:-}
        GIT_SHA: ${GIT_SHA:-unknown}
      secrets:
        - sentry_auth_token
    command: npm start -w @sitelayer/api
    environment:
      NODE_ENV: production
      APP_TIER: ${APP_TIER:-prod}
      FEATURE_FLAGS: ${FEATURE_FLAGS:-}
      PORT: '3001'
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_PROD_RO: ${DATABASE_URL_PROD_RO:-}
      DATABASE_SSL_REJECT_UNAUTHORIZED: ${DATABASE_SSL_REJECT_UNAUTHORIZED:-true}
      ACTIVE_COMPANY_SLUG: ${ACTIVE_COMPANY_SLUG:-la-operations}
      ACTIVE_USER_ID: ${ACTIVE_USER_ID:-demo-user}
      QBO_CLIENT_ID: ${QBO_CLIENT_ID:-demo}
      QBO_CLIENT_SECRET: ${QBO_CLIENT_SECRET:-demo}
      QBO_REDIRECT_URI: ${QBO_REDIRECT_URI:-http://localhost:3001/api/integrations/qbo/callback}
      QBO_SUCCESS_REDIRECT_URI: ${QBO_SUCCESS_REDIRECT_URI:-http://localhost:3000/?qbo=connected}
      QBO_ENVIRONMENT: ${QBO_ENVIRONMENT:-sandbox}
      QBO_STATE_SECRET: ${QBO_STATE_SECRET:-demo-qbo-state-secret}
      CLERK_SECRET_KEY: ${CLERK_SECRET_KEY:-}
      DO_SPACES_KEY: ${DO_SPACES_KEY:-}
      DO_SPACES_SECRET: ${DO_SPACES_SECRET:-}
      DO_SPACES_REGION: ${DO_SPACES_REGION:-tor1}
      DO_SPACES_BUCKET: ${DO_SPACES_BUCKET:-sitelayer-blueprints-prod}
      BLUEPRINT_STORAGE_ROOT: ${BLUEPRINT_STORAGE_ROOT:-/app/storage/blueprints}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ORG: ${SENTRY_ORG:-sandolabs}
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      DEBUG_TRACE_TOKEN: ${DEBUG_TRACE_TOKEN:-}
      DEBUG_ALLOW_PROD: ${DEBUG_ALLOW_PROD:-}
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:5173,http://localhost:3000}
      CLERK_JWT_KEY: ${CLERK_JWT_KEY:-}
      CLERK_ISSUER: ${CLERK_ISSUER:-}
      INTERNAL_AUTH_TOKEN: ${INTERNAL_AUTH_TOKEN:-}
      AUTH_ALLOW_HEADER_FALLBACK: ${AUTH_ALLOW_HEADER_FALLBACK:-}
      API_METRICS_TOKEN: ${API_METRICS_TOKEN:-}
      APP_BUILD_SHA: ${GIT_SHA:-unknown}
    volumes:
      - blueprint_storage:/app/storage/blueprints
    restart: always
    healthcheck:
      test:
        [
          'CMD',
          'node',
          '-e',
          "require('node:http').get('http://127.0.0.1:3001/health',r=>process.exit(r.statusCode===200?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    networks:
      - sitelayer

  web:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_COMPANY_SLUG: ${VITE_COMPANY_SLUG:-la-operations}
        VITE_USER_ID: ${VITE_USER_ID:-demo-user}
        VITE_APP_TIER: ${VITE_APP_TIER:-prod}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_ENVIRONMENT: ${VITE_SENTRY_ENVIRONMENT:-production}
        VITE_SENTRY_RELEASE: ${VITE_SENTRY_RELEASE:-}
        VITE_SENTRY_TRACES_SAMPLE_RATE: ${VITE_SENTRY_TRACES_SAMPLE_RATE:-0.1}
        VITE_SENTRY_REPLAYS_SESSION_SAMPLE_RATE: ${VITE_SENTRY_REPLAYS_SESSION_SAMPLE_RATE:-0.1}
        VITE_SENTRY_REPLAYS_ON_ERROR_SAMPLE_RATE: ${VITE_SENTRY_REPLAYS_ON_ERROR_SAMPLE_RATE:-1.0}
        SENTRY_ORG: ${SENTRY_ORG:-sandolabs}
        SENTRY_WEB_PROJECT: ${SENTRY_WEB_PROJECT:-sitelayer-web}
        SENTRY_RELEASE: ${SENTRY_RELEASE:-}
        GIT_SHA: ${GIT_SHA:-unknown}
      secrets:
        - sentry_auth_token
    command: npm start -w @sitelayer/web
    environment:
      NODE_ENV: production
    restart: always
    networks:
      - sitelayer

  worker:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_COMPANY_SLUG: ${VITE_COMPANY_SLUG:-la-operations}
        VITE_USER_ID: ${VITE_USER_ID:-demo-user}
        VITE_APP_TIER: ${VITE_APP_TIER:-prod}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_ENVIRONMENT: ${VITE_SENTRY_ENVIRONMENT:-production}
        VITE_SENTRY_RELEASE: ${VITE_SENTRY_RELEASE:-}
        VITE_SENTRY_TRACES_SAMPLE_RATE: ${VITE_SENTRY_TRACES_SAMPLE_RATE:-0.1}
        VITE_SENTRY_REPLAYS_SESSION_SAMPLE_RATE: ${VITE_SENTRY_REPLAYS_SESSION_SAMPLE_RATE:-0.1}
        VITE_SENTRY_REPLAYS_ON_ERROR_SAMPLE_RATE: ${VITE_SENTRY_REPLAYS_ON_ERROR_SAMPLE_RATE:-1.0}
        SENTRY_ORG: ${SENTRY_ORG:-sandolabs}
        SENTRY_WEB_PROJECT: ${SENTRY_WEB_PROJECT:-sitelayer-web}
        SENTRY_RELEASE: ${SENTRY_RELEASE:-}
        GIT_SHA: ${GIT_SHA:-unknown}
      secrets:
        - sentry_auth_token
    command: npm start -w @sitelayer/worker
    environment:
      NODE_ENV: production
      APP_TIER: ${APP_TIER:-prod}
      FEATURE_FLAGS: ${FEATURE_FLAGS:-}
      DATABASE_URL: ${DATABASE_URL}
      DATABASE_URL_PROD_RO: ${DATABASE_URL_PROD_RO:-}
      DATABASE_SSL_REJECT_UNAUTHORIZED: ${DATABASE_SSL_REJECT_UNAUTHORIZED:-true}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ORG: ${SENTRY_ORG:-sandolabs}
      SENTRY_AUTH_TOKEN: ${SENTRY_AUTH_TOKEN:-}
      SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      DEBUG_TRACE_TOKEN: ${DEBUG_TRACE_TOKEN:-}
      APP_BUILD_SHA: ${GIT_SHA:-unknown}
    restart: always
    networks:
      - sitelayer

  caddy:
    image: caddy:2-alpine
    restart: always
    ports:
      - '80:80'
      - '443:443'
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - sitelayer
    depends_on:
      - api
      - web

networks:
  sitelayer:
    driver: bridge

volumes:
  blueprint_storage:
  caddy_data:
  caddy_config:

secrets:
  sentry_auth_token:
    environment: SENTRY_AUTH_TOKEN
