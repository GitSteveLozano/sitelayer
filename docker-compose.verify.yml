# docker-compose override used ONLY by scripts/verify-local.sh's e2e stage.
#
# The base docker-compose.yml's `db` service publishes NO host port and
# `minio` pins host ports 9000/9001. The verify gate runs an ISOLATED compose
# project (sitelayer-verify-*) so it must not collide with a developer's live
# `sitelayer` stack (which already binds 9000/9001) and the host-run app
# processes need to reach postgres over localhost. This override:
#
#   * publishes `db` on an EPHEMERAL host port (target-only mapping) so
#     `docker compose port db 5432` resolves a real, free host port that the
#     host-run api/web/worker + migrate-db.sh connect to. Letting Docker pick
#     the host port means two concurrent verify runs (or a live dev stack on
#     5433) never collide.
#   * remaps `minio` console/API to EPHEMERAL host ports for the same reason —
#     the gate's e2e stack must coexist with a developer's running stack.
#
# Used as:  docker compose -p <project> -f docker-compose.yml -f docker-compose.verify.yml ...
services:
  db:
    # !override REPLACES the base service's ports list instead of appending to
    # it (compose merges list-valued keys by concatenation otherwise). The base
    # `db` publishes no port, but being explicit keeps intent clear.
    ports: !override
      # Target-only mapping → Docker assigns a free host port; the gate reads
      # it back via `docker compose port db 5432`.
      - '5432'
    # !override DROPS the /docker-entrypoint-initdb.d mount. The base compose
    # mounts docker/postgres/init there so a fresh dev DB self-seeds; but the
    # verify gate applies the SAME migrations through scripts/migrate-db.sh
    # (ledger-tracked in schema_migrations), exactly like CI's plain postgres
    # service. Keeping the initdb mount would apply every migration TWICE —
    # once raw by initdb (no ledger), once by migrate-db.sh — and the second
    # pass fails on non-re-runnable migrations (e.g. 017's function signature).
    # So we keep ONLY the data volume here and let migrate-db.sh be the single
    # migration authority.
    volumes: !override
      - pgdata:/var/lib/postgresql

  minio:
    # !override so the base `9000:9000` / `9001:9001` fixed host bindings are
    # DROPPED (they collide with a developer's live stack) and minio is
    # published on ephemeral host ports instead.
    ports: !override
      - '9000'
      - '9001'
