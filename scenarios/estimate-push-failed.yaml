# Estimate push failed — estimate_push in state=failed (worker QBO 500
# simulated).
#
# What this exercises:
#   - estimate_push reducer walked through REVIEW → APPROVE → POST_REQUESTED
#     → POST_FAILED so the row lands in state=failed with the `error`
#     column populated.
#   - The `RETRY_POST` next-event in the headless workflow UI is the
#     only manual action available from this state; tests can verify the
#     snapshot's `next_events` matches.
#   - workflow_event_log carries four rows so scripts/replay-workflow.ts
#     verifies reducer ↔ persisted row alignment across the failure path.
#
# How to use:
#   npx tsx scripts/seed-scenario.ts scenarios/estimate-push-failed.yaml
#   # Then hit GET /api/estimate-pushes/<id> and confirm:
#   #   { state: 'failed', error: 'QBO 500 — simulated', next_events: [
#   #     { type: 'RETRY_POST', label: '...' },
#   #     { type: 'VOID', label: '...' },
#   #   ] }

company:
  slug: acme-estfailed
  name: Acme Estimate-Failed

members:
  - clerk_user_id: e2e-admin
    role: admin
  - clerk_user_id: e2e-office
    role: office

customers:
  - ref: customer-bigco
    name: Big Customer Co.

projects:
  - ref: project-failed
    name: Estimate-Failed Project
    customer_ref: customer-bigco
    division_code: D4
    status: active
    bid_total: 88000.00
    lifecycle_state: estimating
    lifecycle_state_version: 2

estimates:
  - ref: est-failed
    project_ref: project-failed
    customer_ref: customer-bigco
    subtotal: 25000.00
    push_event_log:
      - type: REVIEW
        reviewed_at: '2026-01-15T10:00:00.000Z'
        reviewed_by: e2e-office
      - type: APPROVE
        approved_at: '2026-01-15T11:00:00.000Z'
        approved_by: e2e-admin
      - type: POST_REQUESTED
      - type: POST_FAILED
        failed_at: '2026-01-15T11:05:00.000Z'
        error: 'QBO 500 — simulated'
