# Mid-flight rental — rental_billing_run stuck in `posting` 15 minutes ago.
#
# What this exercises:
#   - rental_billing_run reducer walked through APPROVE → POST_REQUESTED so
#     the entity row lands in state=posting with state_version=3.
#   - mutation_outbox row stamped at now() - 15 min so the worker's claim
#     query (`next_attempt_at <= now()`) picks it up immediately on the
#     next heartbeat.
#   - workflow_event_log carries two rows (APPROVE, POST_REQUESTED) so
#     scripts/replay-workflow.ts can verify reducer ↔ row alignment.
#
# How to use:
#   DATABASE_URL=postgres://... \
#     npx tsx scripts/seed-scenario.ts scenarios/mid-flight-rental.yaml
#   # Then start the worker — it should drain the outbox on the next tick.
#   # If QBO_LIVE_RENTAL_INVOICE=1, the worker hits the live sandbox; the
#   # default stub returns synthetic ids so the loop completes end-to-end.

company:
  slug: acme-midflight
  name: Acme Mid-Flight

members:
  - clerk_user_id: e2e-admin
    role: admin
  - clerk_user_id: e2e-office
    role: office
  - clerk_user_id: e2e-foreman
    role: foreman

customers:
  - ref: customer-bigco
    name: Big Customer Co.

workers:
  - ref: foreman-1
    name: Foreman One
    role: foreman

inventory:
  - ref: scaffold-frame
    code: SCAF-MID
    description: Mid-flight Scaffold Frame
    default_rental_rate: 1.50
    replacement_value: 250.00

projects:
  - ref: project-alpha
    name: Mid-Flight Tower
    customer_ref: customer-bigco
    division_code: D4
    status: active
    bid_total: 75000.00
    lifecycle_state: in_progress
    lifecycle_state_version: 4

rentals:
  - ref: rental-stuck
    project_ref: project-alpha
    customer_ref: customer-bigco
    inventory_ref: scaffold-frame
    quantity: 25
    billing_cycle_days: 25
    agreed_rate: 1.50
    billing_start_date: '2026-01-01'
    period_start: '2026-01-01'
    period_end: '2026-01-25'
    subtotal: 937.50
    billing_event_log:
      - type: APPROVE
        approved_at: '2026-01-15T10:00:00.000Z'
        approved_by: e2e-office
      - type: POST_REQUESTED
    # Backdate the outbox row so the worker treats it as ready-to-retry.
    outbox_next_attempt_offset_minutes: -15
