# steve-demo — L&A Exteriors, a small EIFS / stucco contractor.
#
# The single curated tenant the demo tier (demo.preview.sitelayer.sandolab.xyz)
# lands every magic-link role in. One company, five projects, authored so that
# whichever role a magic-link resolves to, the operator opens onto something
# populated and compelling:
#
#   OWNER     (e2e-admin)  → 5 active jobs incl. one AT-RISK with a triggered
#                            guardrail (the backdated stop-work issue), a posted
#                            invoice, an approvals queue (a `generated` billing
#                            run + a `reviewed` estimate), a sent change order,
#                            scope-vs-bid money + overrunning material spend.
#   ESTIMATOR (e2e-office) → takeoff drafts incl. two AI-queue items (one
#                            auto-takeoff, one auto-count) + the LA item library
#                            and exterior-cladding assemblies seeded for free by
#                            seedCompanyDefaults.
#   FOREMAN   (e2e-foreman)→ today's confirmed crew schedule, a stop-work
#                            blocker, one submitted + one draft daily log.
#   CREW      (e2e-member) → scheduled on today's job + clocked-in right now
#                            (an `in` clock event with no `out`).
#
# Authored against the seeder schema in scripts/seed-scenario.ts (incl. the
# additive demo sections: estimate_lines, material_bills, labor_entries,
# change_orders, crew_schedules, daily_logs, takeoff_drafts). Deterministic +
# idempotent: every row keys on a stable ref-hashed UUID and inserts ON CONFLICT
# DO NOTHING, so re-seeding on every demo deploy is a no-op.
#
# How to seed (one command; demo-tier only — the seeder refuses APP_TIER=prod):
#   APP_TIER=demo \
#   DATABASE_URL='postgres://sitelayer_demo_app:…@…:25060/sitelayer_demo?sslmode=require' \
#   DATABASE_SSL_REJECT_UNAUTHORIZED=false \
#     npm run seed:demo
#   # (or)  npx tsx scripts/seed-scenario.ts scenarios/steve-demo.yaml
#
# Freshness: time-relative rows (today's crew schedule, the clocked-in-now CREW
# worker, the draft daily log) use *_offset_days / *_offset_minutes fields. The
# seeder keys their ids on the resolved calendar date, so a re-seed on a new day
# mints fresh "today" rows while the same-day re-seed stays a no-op.

company:
  slug: steve-demo
  name: L&A Exteriors

# The magic-link role grants. company_memberships is what gives a role access;
# getCompany() returns null without a row here. office collapses to admin on
# read (packages/domain/src/roles.ts), so the ESTIMATOR link can map to either
# e2e-office or e2e-admin — both are seeded.
members:
  - { clerk_user_id: e2e-admin, role: admin } # OWNER
  - { clerk_user_id: e2e-office, role: office } # ESTIMATOR
  - { clerk_user_id: e2e-foreman, role: foreman } # FOREMAN
  - { clerk_user_id: e2e-member, role: member } # CREW
  - { clerk_user_id: e2e-bookkeeper, role: bookkeeper }

customers:
  - { ref: cust-maple, name: Maple Street HOA }
  - { ref: cust-riverside, name: Riverside Medical Group }
  - { ref: cust-oakwood, name: Oakwood Builders }
  - { ref: cust-hillcrest, name: Hillcrest Property Mgmt }
  - { ref: cust-sunset, name: Sunset Plaza LLC }

workers:
  - { ref: foreman-lead, name: Marco Diaz, role: foreman, clerk_user_id: e2e-foreman }
  - { ref: est-lead, name: Dana Reyes, role: office, clerk_user_id: e2e-office }
  - { ref: crew-1, name: Luis Romero, role: crew, clerk_user_id: e2e-member }
  - { ref: crew-2, name: Sam Carter, role: crew }
  - { ref: crew-3, name: Priya Nair, role: crew }

inventory:
  - {
      ref: scaffold-frame,
      code: SCAF-001,
      description: Scaffold Frame 5ft,
      default_rental_rate: 1.50,
      replacement_value: 250.00,
    }

projects:
  - {
      ref: maple,
      name: Maple Street Townhomes,
      customer_ref: cust-maple,
      division_code: D4,
      status: active,
      bid_total: 182000.00,
      labor_rate: 65,
      target_sqft_per_hr: 18,
      bonus_pool: 6000,
      lifecycle_state: in_progress,
      lifecycle_state_version: 4,
    }
  - {
      ref: riverside,
      name: Riverside Medical Phase 2,
      customer_ref: cust-riverside,
      division_code: D4,
      status: active,
      bid_total: 410000.00,
      labor_rate: 72,
      target_sqft_per_hr: 15,
      lifecycle_state: in_progress,
      lifecycle_state_version: 4,
    }
  - {
      ref: oakwood,
      name: Oakwood Custom Home,
      customer_ref: cust-oakwood,
      division_code: D1,
      status: active,
      bid_total: 96000.00,
      lifecycle_state: in_progress,
      lifecycle_state_version: 4,
    }
  - {
      ref: hillcrest,
      name: Hillcrest Renovation,
      customer_ref: cust-hillcrest,
      division_code: D3,
      status: active,
      bid_total: 54000.00,
      lifecycle_state: estimating,
      lifecycle_state_version: 2,
    }
  - {
      ref: sunset,
      name: Sunset Plaza Retail,
      customer_ref: cust-sunset,
      division_code: D4,
      status: active,
      bid_total: 138000.00,
      lifecycle_state: in_progress,
      lifecycle_state_version: 4,
    }

# ---- OWNER money: a posted invoice + an approval-pending billing run ----
rentals:
  # posted => the demo's "paid invoice" (rental_billing_run terminal `posted`
  # with a qbo_invoice_id).
  - ref: maple-invoice
    project_ref: maple
    customer_ref: cust-maple
    inventory_ref: scaffold-frame
    quantity: 40
    agreed_rate: 1.50
    subtotal: 4500.00
    billing_start_date: '2026-05-01'
    period_start: '2026-05-01'
    period_end: '2026-05-25'
    billing_event_log:
      - { type: APPROVE, approved_at: '2026-05-01T10:00:00.000Z', approved_by: e2e-admin }
      - { type: POST_REQUESTED }
      - { type: POST_SUCCEEDED, posted_at: '2026-05-01T10:05:00.000Z', qbo_invoice_id: 'DEMO-INV-1041' }
  # generated => sits in the OWNER approvals queue awaiting APPROVE (no event log).
  - ref: riverside-pending
    project_ref: riverside
    customer_ref: cust-riverside
    inventory_ref: scaffold-frame
    quantity: 120
    agreed_rate: 1.50
    subtotal: 13800.00
    period_start: '2026-05-01'
    period_end: '2026-05-25'

# reviewed => OWNER approval queue (estimate side), awaiting APPROVE.
estimates:
  - ref: oakwood-est
    project_ref: oakwood
    customer_ref: cust-oakwood
    subtotal: 96000.00
    push_event_log:
      - { type: REVIEW, reviewed_at: '2026-05-20T09:00:00.000Z', reviewed_by: e2e-office }

# ---- AT-RISK guardrail: a stop-work issue backdated past the 15-min
#      auto-escalation threshold on the Riverside job (FOREMAN's blocker too) ----
worker_issues:
  - ref: riverside-stopped
    project_ref: riverside
    worker_ref: foreman-lead
    reporter_clerk_user_id: e2e-foreman
    kind: materials_out
    severity: stopped
    message: 'Crew stopped — EIFS mesh shipment short on the east elevation'
    created_offset_minutes: -20

# ---- OWNER scope-vs-bid money. Service item codes are the real LA template
#      codes seeded by seedCompanyDefaults (EPS / Basecoat / Finish Coat /
#      Cultured Stone), so estimate lines tie back to the item library. ----
estimate_lines:
  - { project_ref: maple, service_item_code: EPS, quantity: 8200, unit: sqft, rate: 4.00, amount: 32800.00 }
  - { project_ref: maple, service_item_code: Basecoat, quantity: 8200, unit: sqft, rate: 2.50, amount: 20500.00 }
  - { project_ref: maple, service_item_code: 'Finish Coat', quantity: 8200, unit: sqft, rate: 3.50, amount: 28700.00 }
  - { project_ref: riverside, service_item_code: EPS, quantity: 19500, unit: sqft, rate: 4.00, amount: 78000.00 }
  - {
      project_ref: oakwood,
      service_item_code: 'Cultured Stone',
      quantity: 1900,
      unit: sqft,
      rate: 16.50,
      amount: 31350.00,
    }

# ---- OWNER material spend (Riverside overrunning => the at-risk story) ----
material_bills:
  - {
      project_ref: riverside,
      vendor_name: 'Sto Corp',
      amount: 41200.00,
      description: 'EIFS base + mesh',
      occurred_on_offset_days: -18,
    }
  - {
      project_ref: riverside,
      vendor_name: 'BlueLine Rentals',
      amount: 9800.00,
      bill_type: rental,
      occurred_on_offset_days: -15,
    }
  - { project_ref: maple, vendor_name: 'Sto Corp', amount: 18600.00, occurred_on_offset_days: -27 }

# ---- Productivity ledger feeding analytics + the crew story ----
labor_entries:
  - {
      project_ref: sunset,
      worker_ref: crew-1,
      service_item_code: EPS,
      hours: 8,
      sqft_done: 150,
      occurred_on_offset_days: 0,
    }
  - {
      project_ref: maple,
      worker_ref: crew-2,
      service_item_code: Basecoat,
      hours: 7.5,
      sqft_done: 130,
      occurred_on_offset_days: -1,
    }

# ---- OWNER: a change order awaiting client signature (sent) ----
change_orders:
  - ref: oakwood-co1
    project_ref: oakwood
    number: 1
    description: 'Add rear elevation stone veneer (client request)'
    value_delta: 14500.00
    schedule_impact_days: 5
    created_by: e2e-admin
    co_event_log:
      - { type: SEND, actor_user_id: e2e-admin, occurred_at: '2026-05-22T14:00:00.000Z' }

# ---- FOREMAN: today's confirmed crew (3 crew) ----
crew_schedules:
  - ref: sunset-today
    project_ref: sunset
    scheduled_for_offset_days: 0
    status: confirmed
    confirmed_by: e2e-foreman
    crew:
      - { worker_ref: crew-1 }
      - { worker_ref: crew-2 }
      - { worker_ref: crew-3 }

# ---- FOREMAN: one submitted (yesterday) + one draft (today) daily log ----
daily_logs:
  - {
      project_ref: maple,
      foreman_user_id: e2e-foreman,
      occurred_on_offset_days: -1,
      status: submitted,
      notes: 'Finished south elevation basecoat; mesh embedded clean. 3 crew on site.',
    }
  - {
      project_ref: sunset,
      foreman_user_id: e2e-foreman,
      occurred_on_offset_days: 0,
      status: draft,
      notes: 'Started east wall EPS. Waiting on inspector before finish coat.',
    }

# ---- CREW clocked-in NOW (an `in` with no matching `out`) on today's job ----
clock_events:
  - {
      worker_ref: crew-1,
      project_ref: sunset,
      clerk_user_id: e2e-member,
      event_type: 'in',
      occurred_at_offset_minutes: -150,
    }
  - { worker_ref: crew-2, project_ref: sunset, event_type: 'in', occurred_at_offset_minutes: -145 }

# ---- ESTIMATOR: a manual draft + two AI-queue items (review_required) ----
takeoff_drafts:
  - { ref: hill-manual, project_ref: hillcrest, name: 'Manual takeoff v1', source: manual, kind: takeoff }
  - ref: hill-ai-takeoff
    project_ref: hillcrest
    name: 'AI auto-takeoff'
    source: blueprint_vision
    kind: takeoff
    review_required: true
    result_json: { summary: { total_sqft: 6420, confidence: 0.86 } }
    measurements:
      - { service_item_code: EPS, quantity: 6420, unit: sqft }
  - ref: hill-ai-count
    project_ref: hillcrest
    name: 'AI auto-count'
    source: blueprint_vision
    kind: count
    review_required: true
    result_json: { summary: { window_count: 38, confidence: 0.79 } }
