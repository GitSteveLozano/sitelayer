# QBO sync run failed — qbo_sync_run workflow with a failure path.
#
# What this exercises:
#   - qbo_sync_run reducer walked through START_SYNC → SYNC_FAILED so
#     the row lands in state=failed with state_version=3.
#   - The `RETRY` human-event surface in the headless workflow UI is the
#     only manual action available from this state.
#   - workflow_event_log carries two rows (START_SYNC, SYNC_FAILED) so
#     scripts/replay-workflow.ts verifies reducer ↔ persisted row
#     alignment across the failure path.
#
# How to use:
#   DATABASE_URL=postgres://... \
#     npx tsx scripts/seed-scenario.ts scenarios/qbo-sync-run-failed.yaml
#   # Then GET /api/qbo-sync-runs/<id> and confirm:
#   #   { status: 'failed', error: 'Intuit 503 — simulated', next_events: [
#   #     { type: 'RETRY', label: 'Retry sync' },
#   #   ] }

company:
  slug: acme-qbosync
  name: Acme QBO Sync

members:
  - clerk_user_id: e2e-admin
    role: admin

qbo_sync_runs:
  - ref: sync-failed
    provider: qbo
    triggered_by: e2e-admin
    sync_event_log:
      - type: START_SYNC
        started_at: '2026-01-15T10:00:00.000Z'
        triggered_by: e2e-admin
      - type: SYNC_FAILED
        failed_at: '2026-01-15T10:00:15.000Z'
        error: 'Intuit 503 — simulated'
