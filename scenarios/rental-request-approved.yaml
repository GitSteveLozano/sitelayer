# Portal rental request approved — rental_request_approval workflow.
#
# What this exercises:
#   - rental_request_approval reducer walked through APPROVE so the row
#     lands in state=approved with state_version=2.
#   - workflow_event_log carries one row (APPROVE) so
#     scripts/replay-workflow.ts can verify reducer ↔ persisted row
#     alignment.
#
# How to use:
#   DATABASE_URL=postgres://... \
#     npx tsx scripts/seed-scenario.ts scenarios/rental-request-approved.yaml
#   # Then inspect rental_requests and confirm status='approved'.

company:
  slug: acme-portal
  name: Acme Portal

members:
  - clerk_user_id: e2e-admin
    role: admin
  - clerk_user_id: e2e-office
    role: office

customers:
  - ref: customer-portal
    name: Portal Customer

rental_requests:
  - ref: req-frames-30
    customer_ref: customer-portal
    contact_name: Site Foreman
    contact_email: foreman@portal-customer.example
    contact_phone: '555-0100'
    requested_start: '2026-02-01'
    requested_end: '2026-02-28'
    notes: 'Need 30 scaffold frames for east elevation'
    items:
      - inventory_code: SCAF-FRAME
        qty: 30
        start: '2026-02-01'
        end: '2026-02-28'
    approval_event_log:
      - type: APPROVE
        approved_at: '2026-01-15T10:00:00.000Z'
        approved_by: e2e-office
