# Takeoff bulk — one project with 500 takeoff_measurements rows.
#
# What this exercises:
#   - Index health on `takeoff_measurements (company_id, draft_id)` and
#     the polygon-render path when a project has substantially more
#     measurements than the typical residential-takeoff scope (~30-50).
#   - The bulk INSERT path in the seeder (multi-row VALUES) — a sanity
#     check that the script's perf-mode INSERT actually runs.
#   - Bundle budget for the takeoff screen: 500 polygons stresses the
#     SVG annotation overlay and the offline-queue serializer.
#
# How to use:
#   npx tsx scripts/seed-scenario.ts scenarios/takeoff-bulk.yaml
#   # Then open the takeoff screen for the seeded project and watch the
#   # browser's frame budget. Optionally run an explain on the
#   # company_id/draft_id index to confirm the bulk insert kept it
#   # selective.

company:
  slug: acme-bulk
  name: Acme Bulk

members:
  - clerk_user_id: e2e-admin
    role: admin

customers:
  - ref: customer-bigco
    name: Big Customer Co.

projects:
  - ref: project-bulk
    name: Bulk Takeoff Smoke
    customer_ref: customer-bigco
    division_code: D4
    status: active
    bid_total: 500000.00
    lifecycle_state: in_progress
    lifecycle_state_version: 4

takeoff_measurements:
  project_ref: project-bulk
  count: 500
  service_item_code: EPS
  unit: sqft
