# Opt-in observability shipper. Brings logs off the ephemeral Docker json-file
# into Axiom (durable, 30-day, LLM-queryable via APL). Does NOT touch the prod
# app stack. Activate on the droplet once you have an Axiom account:
#
#   # in /app/sitelayer/.env (or exported): AXIOM_TOKEN=... AXIOM_DATASET=fleet
#   docker compose -f docker-compose.observability.yml up -d
#
# It joins the prod compose network so docker_logs can read the app containers.
services:
  vector:
    image: timberio/vector:0.49.0-alpine
    container_name: sitelayer-vector-1
    restart: unless-stopped
    environment:
      AXIOM_TOKEN: ${AXIOM_TOKEN:-}
      AXIOM_DATASET: ${AXIOM_DATASET:-fleet}
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - ./ops/vector/vector.toml:/etc/vector/vector.toml:ro
    command: ['--config', '/etc/vector/vector.toml']
    logging:
      driver: json-file
      options:
        max-size: '10m'
        max-file: '3'
