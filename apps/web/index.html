<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#d9904a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Sitelayer" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <title>Sitelayer</title>
    <script>
      ;(function () {
        try {
          var d = document.documentElement,
            s = d.style,
            l = localStorage,
            g = function (k) {
              try {
                return l.getItem(k)
              } catch (e) {
                return null
              }
            },
            v = g('sitelayer.active-company-slug')
          if (v && (v = v.trim())) d.dataset.companySlug = v
          var t = g('sitelayer.theme')
          if (t !== 'dark' && t !== 'light') t = matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light'
          d.dataset.theme = t
          s.setProperty('--theme-bg', t === 'dark' ? '#1c1816' : '#f5f1ec')
          s.setProperty('--theme-fg', t === 'dark' ? '#f3ecdf' : '#1c1816')
          var w = parseInt(g('sitelayer.sidebar-width'), 10)
          s.setProperty('--sidebar-width', (w >= 0 && w <= 600 ? w : 0) + 'px')
          var c = g('sitelayer.sidebar-collapsed')
          if (c === '1' || c === 'true') d.dataset.sidebarCollapsed = '1'
          var a = g('sitelayer.act-as')
          if (a) d.dataset.actAs = a
        } catch (e) {}
      })()
    </script>
    <style>
      /* Cold-start splash (v2). Renders before any JS evaluates so the user
         sees the brand mark instead of a flash of blank canvas; stripped once
         React mounts and replaces #root content. v2 brutalist: hi-vis yellow
         field, square black SL mark with yellow letters, Inter Tight. The font
         stack falls back to the system face until the self-hosted woff2 swaps
         in (field workers are offline-first). */
      html,
      body {
        margin: 0;
        background: var(--theme-bg, #ffd400);
      }
      body {
        font-family: 'Inter Tight', 'Inter', system-ui, -apple-system, BlinkMacSystemFont, sans-serif;
        color: var(--theme-fg, #0f0e0c);
      }
      #root:empty {
        position: fixed;
        inset: 0;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        gap: 18px;
        background: var(--theme-bg, #ffd400);
        color: var(--theme-fg, #0f0e0c);
      }
      #root:empty::before {
        content: 'SL';
        display: inline-flex;
        align-items: center;
        justify-content: center;
        width: 76px;
        height: 76px;
        border-radius: 0;
        background: #0f0e0c;
        color: #ffd400;
        font-weight: 900;
        font-size: 34px;
        letter-spacing: -0.04em;
      }
      #root:empty::after {
        content: 'SITELAYER';
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.28em;
        text-indent: 0.28em;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
