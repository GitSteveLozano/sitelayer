<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover" />
    <meta name="theme-color" content="#d9904a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="Sitelayer" />
    <link rel="icon" type="image/svg+xml" href="/icons/icon.svg" />
    <link rel="apple-touch-icon" href="/icons/icon.svg" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Geist+Mono:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <title>Sitelayer</title>
    <style>
      /* Cold-start splash from Sitemap §1 panel 5. Renders before any
         JS evaluates so the user sees the brand mark + tagline instead
         of a flash of blank canvas. The .m-splash class is stripped
         from the body once React mounts and replaces #root content. */
      html, body { margin: 0; background: #f5f1ec; }
      body { font-family: 'Geist', -apple-system, BlinkMacSystemFont, system-ui, sans-serif; color: #1c1816; }
      #root:empty {
        position: fixed; inset: 0;
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        gap: 14px;
        background: #f5f1ec;
        color: #1c1816;
      }
      #root:empty::before {
        content: 'SL';
        display: inline-flex; align-items: center; justify-content: center;
        width: 64px; height: 64px;
        border-radius: 16px;
        background: #d9904a;
        color: white;
        font-weight: 700; font-size: 24px; letter-spacing: -0.02em;
      }
      #root:empty::after {
        content: 'Sitelayer';
        font-size: 17px; font-weight: 600; letter-spacing: -0.01em;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
