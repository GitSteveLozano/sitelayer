services:
  db:
    image: postgres:18-alpine
    environment:
      POSTGRES_DB: sitelayer
      POSTGRES_USER: sitelayer
      POSTGRES_PASSWORD: sitelayer
    # pg18 image stores data under a major-version subdirectory of
    # /var/lib/postgresql, so the volume must mount the parent — not
    # /var/lib/postgresql/data — or the entrypoint refuses to start.
    volumes:
      - pgdata:/var/lib/postgresql
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sitelayerlocal
      MINIO_ROOT_PASSWORD: sitelayerlocal
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 sitelayerlocal sitelayerlocal; do sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/sitelayer-blueprints-local;
      echo 'minio ready: bucket sitelayer-blueprints-local';
      "
    restart: 'no'

  api:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install --no-audit --no-fund --prefer-offline && npm run dev:api"
    environment:
      NODE_ENV: development
      APP_TIER: local
      FEATURE_FLAGS: ${FEATURE_FLAGS:-}
      PORT: '3001'
      DATABASE_URL: postgres://sitelayer:sitelayer@db:5432/sitelayer
      ACTIVE_COMPANY_SLUG: la-operations
      DO_SPACES_KEY: sitelayerlocal
      DO_SPACES_SECRET: sitelayerlocal
      DO_SPACES_REGION: us-east-1
      DO_SPACES_BUCKET: sitelayer-blueprints-local
      DO_SPACES_ENDPOINT: http://minio:9000
      MAX_CAPTURE_ARTIFACT_BYTES: ${MAX_CAPTURE_ARTIFACT_BYTES:-52428800}
      CAPTURE_AUTH_AUTO_DISPATCH: ${CAPTURE_AUTH_AUTO_DISPATCH:-}
    ports:
      - '3001:3001'
    depends_on:
      db:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules

  web:
    image: node:20-alpine
    working_dir: /app
    # Local web dev uses the same app as prod. Vite listens on 3100;
    # the host port is mapped to match.
    command: sh -c "npm install --no-audit --no-fund --prefer-offline && npm run dev:web"
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:3001
      VITE_APP_TIER: local
    ports:
      - '3000:3100'
    depends_on:
      - api
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules

  worker:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install --no-audit --no-fund --prefer-offline && npm run dev:worker"
    environment:
      NODE_ENV: development
      APP_TIER: local
      FEATURE_FLAGS: ${FEATURE_FLAGS:-}
      DATABASE_URL: postgres://sitelayer:sitelayer@db:5432/sitelayer
      DO_SPACES_KEY: sitelayerlocal
      DO_SPACES_SECRET: sitelayerlocal
      DO_SPACES_REGION: us-east-1
      DO_SPACES_BUCKET: sitelayer-blueprints-local
      DO_SPACES_ENDPOINT: http://minio:9000
      MAX_CAPTURE_ARTIFACT_BYTES: ${MAX_CAPTURE_ARTIFACT_BYTES:-52428800}
      CAPTURE_ARTIFACT_ANALYSIS_INTERVAL_MS: ${CAPTURE_ARTIFACT_ANALYSIS_INTERVAL_MS:-60000}
      CAPTURE_ARTIFACT_ANALYSIS_LIMIT: ${CAPTURE_ARTIFACT_ANALYSIS_LIMIT:-10}
      CAPTURE_ARTIFACT_ANALYSIS_MAX_BYTES: ${CAPTURE_ARTIFACT_ANALYSIS_MAX_BYTES:-1048576}
      CAPTURE_ARTIFACT_ANALYSIS_AUTO_DISPATCH: ${CAPTURE_ARTIFACT_ANALYSIS_AUTO_DISPATCH:-}
      CAPTURE_ARTIFACT_AUDIO_ANALYSIS_MODE: ${CAPTURE_ARTIFACT_AUDIO_ANALYSIS_MODE:-off}
      CAPTURE_ARTIFACT_WHISPER_URL: ${CAPTURE_ARTIFACT_WHISPER_URL:-http://host.docker.internal:5678}
      CAPTURE_ARTIFACT_WHISPER_PAYLOAD_MODE: ${CAPTURE_ARTIFACT_WHISPER_PAYLOAD_MODE:-base64}
      CAPTURE_ARTIFACT_WHISPER_TIMEOUT_MS: ${CAPTURE_ARTIFACT_WHISPER_TIMEOUT_MS:-10000}
      CAPTURE_ARTIFACT_WHISPER_UNAVAILABLE_POLICY: ${CAPTURE_ARTIFACT_WHISPER_UNAVAILABLE_POLICY:-retry}
      CAPTURE_ARTIFACT_VIDEO_ANALYSIS_MODE: ${CAPTURE_ARTIFACT_VIDEO_ANALYSIS_MODE:-off}
    depends_on:
      db:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    volumes:
      - .:/app
      - worker_node_modules:/app/node_modules
    extra_hosts:
      - 'host.docker.internal:host-gateway'

volumes:
  pgdata:
  minio_data:
  api_node_modules:
  web_node_modules:
  worker_node_modules:
