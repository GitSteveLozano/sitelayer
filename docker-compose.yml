services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: sitelayer
      POSTGRES_USER: sitelayer
      POSTGRES_PASSWORD: sitelayer
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: sitelayerlocal
      MINIO_ROOT_PASSWORD: sitelayerlocal
    ports:
      - '9000:9000'
      - '9001:9001'
    volumes:
      - minio_data:/data

  minio-init:
    image: minio/mc:latest
    depends_on:
      minio:
        condition: service_started
    entrypoint: >
      /bin/sh -c "
      until /usr/bin/mc alias set local http://minio:9000 sitelayerlocal sitelayerlocal; do sleep 1; done;
      /usr/bin/mc mb --ignore-existing local/sitelayer-blueprints-local;
      echo 'minio ready: bucket sitelayer-blueprints-local';
      "
    restart: 'no'

  api:
    build:
      context: .
    command: npm run dev:api
    environment:
      NODE_ENV: development
      APP_TIER: local
      FEATURE_FLAGS: ${FEATURE_FLAGS:-}
      PORT: '3001'
      DATABASE_URL: postgres://sitelayer:sitelayer@db:5432/sitelayer
      ACTIVE_COMPANY_SLUG: la-operations
      DO_SPACES_KEY: sitelayerlocal
      DO_SPACES_SECRET: sitelayerlocal
      DO_SPACES_REGION: us-east-1
      DO_SPACES_BUCKET: sitelayer-blueprints-local
      DO_SPACES_ENDPOINT: http://minio:9000
    ports:
      - '3001:3001'
    depends_on:
      db:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    volumes:
      - .:/app
      - api_node_modules:/app/node_modules

  web:
    build:
      context: .
    command: npm run dev:web
    environment:
      NODE_ENV: development
      VITE_API_URL: http://localhost:3001
      VITE_APP_TIER: local
    ports:
      - '3000:3000'
    depends_on:
      - api
    volumes:
      - .:/app
      - web_node_modules:/app/node_modules

  worker:
    build:
      context: .
    command: npm run dev:worker
    environment:
      NODE_ENV: development
      APP_TIER: local
      FEATURE_FLAGS: ${FEATURE_FLAGS:-}
      DATABASE_URL: postgres://sitelayer:sitelayer@db:5432/sitelayer
      DO_SPACES_KEY: sitelayerlocal
      DO_SPACES_SECRET: sitelayerlocal
      DO_SPACES_REGION: us-east-1
      DO_SPACES_BUCKET: sitelayer-blueprints-local
      DO_SPACES_ENDPOINT: http://minio:9000
    depends_on:
      db:
        condition: service_started
      minio-init:
        condition: service_completed_successfully
    volumes:
      - .:/app
      - worker_node_modules:/app/node_modules

volumes:
  pgdata:
  minio_data:
  api_node_modules:
  web_node_modules:
  worker_node_modules:
