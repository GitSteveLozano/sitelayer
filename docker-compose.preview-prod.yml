services:
  api:
    image: sitelayer-preview:${PREVIEW_IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_COMPANY_SLUG: ${VITE_COMPANY_SLUG:-la-operations}
        VITE_USER_ID: ${VITE_USER_ID:-demo-user}
        VITE_APP_TIER: ${VITE_APP_TIER:-preview}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_ENVIRONMENT: ${VITE_SENTRY_ENVIRONMENT:-preview}
        VITE_SENTRY_RELEASE: ${VITE_SENTRY_RELEASE:-}
        VITE_SENTRY_TRACES_SAMPLE_RATE: ${VITE_SENTRY_TRACES_SAMPLE_RATE:-0.1}
        VITE_SENTRY_REPLAYS_SESSION_SAMPLE_RATE: ${VITE_SENTRY_REPLAYS_SESSION_SAMPLE_RATE:-0.1}
        VITE_SENTRY_REPLAYS_ON_ERROR_SAMPLE_RATE: ${VITE_SENTRY_REPLAYS_ON_ERROR_SAMPLE_RATE:-1.0}
        SENTRY_ORG: ${SENTRY_ORG:-sandolabs}
        SENTRY_WEB_PROJECT: ${SENTRY_WEB_PROJECT:-sitelayer-web}
        SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      secrets:
        - sentry_auth_token
    command: npm start -w @sitelayer/api
    env_file:
      - ${PREVIEW_STACK_ENV_FILE:-.env}
    environment:
      NODE_ENV: production
      APP_TIER: ${APP_TIER:-preview}
      FEATURE_FLAGS: ${FEATURE_FLAGS:-}
      PORT: '3001'
      DATABASE_URL_PROD_RO: ${DATABASE_URL_PROD_RO:-}
      BLUEPRINT_STORAGE_ROOT: /app/storage/blueprints
    volumes:
      - blueprint_storage:/app/storage/blueprints
    restart: unless-stopped
    networks:
      - app
      - router
    labels:
      - traefik.enable=true
      - traefik.docker.network=sitelayer-preview-router
      - traefik.http.routers.sitelayer-${PREVIEW_SLUG}-api.rule=Host(`${PREVIEW_HOST}`) && (Path(`/api`) || PathPrefix(`/api/`) || Path(`/health`))
      - traefik.http.routers.sitelayer-${PREVIEW_SLUG}-api.priority=100
      - traefik.http.routers.sitelayer-${PREVIEW_SLUG}-api.entrypoints=websecure
      - traefik.http.routers.sitelayer-${PREVIEW_SLUG}-api.tls.certresolver=letsencrypt
      - traefik.http.services.sitelayer-${PREVIEW_SLUG}-api.loadbalancer.server.port=3001

  web:
    image: sitelayer-preview:${PREVIEW_IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_COMPANY_SLUG: ${VITE_COMPANY_SLUG:-la-operations}
        VITE_USER_ID: ${VITE_USER_ID:-demo-user}
        VITE_APP_TIER: ${VITE_APP_TIER:-preview}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_ENVIRONMENT: ${VITE_SENTRY_ENVIRONMENT:-preview}
        VITE_SENTRY_RELEASE: ${VITE_SENTRY_RELEASE:-}
        VITE_SENTRY_TRACES_SAMPLE_RATE: ${VITE_SENTRY_TRACES_SAMPLE_RATE:-0.1}
        VITE_SENTRY_REPLAYS_SESSION_SAMPLE_RATE: ${VITE_SENTRY_REPLAYS_SESSION_SAMPLE_RATE:-0.1}
        VITE_SENTRY_REPLAYS_ON_ERROR_SAMPLE_RATE: ${VITE_SENTRY_REPLAYS_ON_ERROR_SAMPLE_RATE:-1.0}
        SENTRY_ORG: ${SENTRY_ORG:-sandolabs}
        SENTRY_WEB_PROJECT: ${SENTRY_WEB_PROJECT:-sitelayer-web}
        SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      secrets:
        - sentry_auth_token
    # The Dockerfile only ships apps/web-v2/dist (post-cutover, see
    # PR #139). The previous `-w @sitelayer/web` here would fail at boot
    # because there's no v1 dist in the runtime image to serve.
    command: npm start -w @sitelayer/web-v2
    environment:
      NODE_ENV: production
    restart: unless-stopped
    networks:
      - router
    labels:
      - traefik.enable=true
      - traefik.docker.network=sitelayer-preview-router
      - traefik.http.routers.sitelayer-${PREVIEW_SLUG}-web.rule=Host(`${PREVIEW_HOST}`)
      - traefik.http.routers.sitelayer-${PREVIEW_SLUG}-web.entrypoints=websecure
      - traefik.http.routers.sitelayer-${PREVIEW_SLUG}-web.tls.certresolver=letsencrypt
      - traefik.http.services.sitelayer-${PREVIEW_SLUG}-web.loadbalancer.server.port=3000

  worker:
    image: sitelayer-preview:${PREVIEW_IMAGE_TAG:-local}
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
      args:
        VITE_API_URL: ${VITE_API_URL:-}
        VITE_COMPANY_SLUG: ${VITE_COMPANY_SLUG:-la-operations}
        VITE_USER_ID: ${VITE_USER_ID:-demo-user}
        VITE_APP_TIER: ${VITE_APP_TIER:-preview}
        VITE_SENTRY_DSN: ${VITE_SENTRY_DSN:-}
        VITE_SENTRY_ENVIRONMENT: ${VITE_SENTRY_ENVIRONMENT:-preview}
        VITE_SENTRY_RELEASE: ${VITE_SENTRY_RELEASE:-}
        VITE_SENTRY_TRACES_SAMPLE_RATE: ${VITE_SENTRY_TRACES_SAMPLE_RATE:-0.1}
        VITE_SENTRY_REPLAYS_SESSION_SAMPLE_RATE: ${VITE_SENTRY_REPLAYS_SESSION_SAMPLE_RATE:-0.1}
        VITE_SENTRY_REPLAYS_ON_ERROR_SAMPLE_RATE: ${VITE_SENTRY_REPLAYS_ON_ERROR_SAMPLE_RATE:-1.0}
        SENTRY_ORG: ${SENTRY_ORG:-sandolabs}
        SENTRY_WEB_PROJECT: ${SENTRY_WEB_PROJECT:-sitelayer-web}
        SENTRY_RELEASE: ${SENTRY_RELEASE:-}
      secrets:
        - sentry_auth_token
    command: npm start -w @sitelayer/worker
    env_file:
      - ${PREVIEW_STACK_ENV_FILE:-.env}
    environment:
      NODE_ENV: production
      APP_TIER: ${APP_TIER:-preview}
      FEATURE_FLAGS: ${FEATURE_FLAGS:-}
      DATABASE_URL_PROD_RO: ${DATABASE_URL_PROD_RO:-}
    profiles:
      - worker
    restart: unless-stopped
    # Worker needs egress for managed Postgres + external integrations.
    # `app` is internal-only so egress comes from `router`.
    networks:
      - app
      - router

networks:
  app:
    driver: bridge
    internal: true
  router:
    name: sitelayer-preview-router
    external: true

volumes:
  blueprint_storage:

secrets:
  sentry_auth_token:
    environment: SENTRY_AUTH_TOKEN
