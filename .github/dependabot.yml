version: 2
updates:
  # GitHub Actions: keep workflow action versions current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch

  # npm: sitelayer is a single-lockfile monorepo (one package-lock.json at the
  # repo root). Per-workspace entries (apps/api, apps/web, packages/*) would
  # update <dir>/package.json without touching the root lockfile, leaving
  # `npm ci` failing on every CI run. The root entry traverses all workspace
  # package.json files via npm workspaces resolution and produces one cohesive
  # PR per cycle.
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
