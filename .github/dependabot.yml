version: 2
updates:
  # GitHub Actions: keep workflow action versions current.
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      actions-minor-patch:
        update-types:
          - minor
          - patch

  # npm root workspace
  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # apps/api
  - package-ecosystem: npm
    directory: /apps/api
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # apps/web (v1 — retired post-cutover; kept as rollback target per ADR 0002).
  # Lower PR cap because we don't want noise on a parked app, but Dependabot
  # is still useful so a security advisory on something v2 also depends on
  # gets surfaced via the v1 entry.
  - package-ecosystem: npm
    directory: /apps/web
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 1
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # apps/web-v2 (v1 cut over to v2 in PR #139; this is the live web app)
  - package-ecosystem: npm
    directory: /apps/web-v2
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # apps/worker
  - package-ecosystem: npm
    directory: /apps/worker
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # packages/config
  - package-ecosystem: npm
    directory: /packages/config
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # packages/domain
  - package-ecosystem: npm
    directory: /packages/domain
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # packages/logger
  - package-ecosystem: npm
    directory: /packages/logger
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch

  # packages/queue
  - package-ecosystem: npm
    directory: /packages/queue
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 5
    groups:
      npm-minor-patch:
        update-types:
          - minor
          - patch
