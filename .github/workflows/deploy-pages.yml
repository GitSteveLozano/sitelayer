name: Deploy v2 to GitHub Pages

# Rebuilds apps/web-v2 with VITE_BASE=/sitelayer/ and pushes the
# resulting dist/ to the `gh-pages` branch so the public demo at
# https://gitstevelozano.github.io/sitelayer/ tracks main.
#
# The v2 SPA still talks to the production API + Clerk tenant — the
# `production` GitHub environment owns the secrets used here.
# Prod's `ALLOWED_ORIGINS` env must include https://gitstevelozano.github.io
# for the demo's API calls to clear CORS.

on:
  push:
    branches: [main]
    paths:
      - 'apps/web-v2/**'
      - 'packages/domain/**'
      - 'packages/workflows/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build v2 with /sitelayer/ base
        env:
          VITE_BASE: /sitelayer/
          VITE_API_URL: ${{ secrets.PAGES_VITE_API_URL || 'https://sitelayer.sandolab.xyz' }}
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.PAGES_VITE_CLERK_PUBLISHABLE_KEY }}
          VITE_APP_TIER: prod
        run: npm run build --workspace @sitelayer/web-v2

      - name: Stage gh-pages tree
        run: |
          # SPA fallback so deep links don't 404 on refresh.
          cp apps/web-v2/dist/index.html apps/web-v2/dist/404.html
          # .nojekyll disables Jekyll processing so /assets/_*.js paths work.
          touch apps/web-v2/dist/.nojekyll

      - name: Publish to gh-pages branch
        uses: peaceiris/actions-gh-pages@4f9cc6602d3f66b9c108549d475ec49e8ef4d45e # v4.0.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./apps/web-v2/dist
          publish_branch: gh-pages
          force_orphan: true
          user_name: github-actions[bot]
          user_email: 41898282+github-actions[bot]@users.noreply.github.com
          commit_message: 'deploy: ${{ github.sha }}'
