name: Deploy v2 to GitHub Pages

# Rebuilds apps/web-v2 with VITE_BASE=/sitelayer/ and publishes the
# resulting dist/ as a GitHub Pages artifact so the public demo at
# https://gitstevelozano.github.io/sitelayer/ tracks main.
#
# Uses the modern `actions/deploy-pages` artifact flow (matches the
# original pre-v2 workflow that was in this repo). This is what the
# "Source: GitHub Actions" mode of the Pages settings expects — pushing
# directly to a `gh-pages` branch is silently ignored when Pages is in
# Actions mode.
#
# The v2 SPA still talks to the production API + Clerk tenant — the
# `production` GitHub environment owns the secrets used here.
# Prod's `ALLOWED_ORIGINS` env must include https://gitstevelozano.github.io
# for the demo's API calls to clear CORS.

on:
  push:
    branches: [main]
    paths:
      - 'apps/web-v2/**'
      - 'packages/domain/**'
      - 'packages/workflows/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: production
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Build v2 with /sitelayer/ base
        env:
          VITE_BASE: /sitelayer/
          VITE_API_URL: ${{ secrets.PAGES_VITE_API_URL || 'https://sitelayer.sandolab.xyz' }}
          # Clerk publishable keys are public by design (they identify the
          # Clerk tenant, not a credential — the secret key is what matters).
          # Default to the test tenant from .env.example so the demo at
          # least loads + sign-in works; override via the secret to point at
          # a prod-tier Clerk app (with the matching CLERK_JWT_KEY on the
          # API droplet so JWT verification accepts the token).
          VITE_CLERK_PUBLISHABLE_KEY: ${{ secrets.PAGES_VITE_CLERK_PUBLISHABLE_KEY || 'pk_test_aW1wcm92ZWQtYmVkYnVnLTMwLmNsZXJrLmFjY291bnRzLmRldiQ' }}
          VITE_APP_TIER: prod
        run: npm run build --workspace @sitelayer/web-v2

      - name: Stage SPA fallback + Jekyll opt-out
        run: |
          # 404.html mirrors index.html so deep-link refreshes don't 404.
          cp apps/web-v2/dist/index.html apps/web-v2/dist/404.html
          # .nojekyll keeps GitHub Pages from rewriting /assets/_*.js paths.
          touch apps/web-v2/dist/.nojekyll

      - uses: actions/upload-pages-artifact@fc324d3547104276b827a68afc52ff2a11cc49c9 # v5.0.0
        with:
          path: ./apps/web-v2/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4.0.5
