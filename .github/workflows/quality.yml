name: Quality

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: quality-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          # Need enough history for the migration immutability guard to
          # locate the merge base with origin/main.
          fetch-depth: 0

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - name: Shell syntax
        run: bash -n scripts/*.sh

      - name: Migration immutability
        run: bash scripts/check-migrations-immutable.sh

      - run: npm run lint

      - run: npm run format

      - run: npm run typecheck

      - run: npm run test

      - run: npm run build

      - run: npm run web:bundle-budget

      - run: npm run web-v2:bundle-budget

      - name: Fixture web build
        run: VITE_FIXTURES=1 npm run build --workspace @sitelayer/web

      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browser
        run: |
          if [ "${{ steps.playwright-cache.outputs.cache-hit }}" = "true" ]; then
            # Cache hit: only the system deps step is needed; browser binaries
            # are already on disk under ~/.cache/ms-playwright.
            npx playwright install-deps chromium
          else
            npx playwright install --with-deps chromium
          fi

      - run: npm run e2e

  test-integration:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    services:
      postgres:
        image: postgres:18-alpine
        env:
          POSTGRES_DB: sitelayer
          POSTGRES_USER: sitelayer
          POSTGRES_PASSWORD: sitelayer
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sitelayer"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 10
    env:
      DATABASE_URL: postgres://sitelayer:sitelayer@localhost:5432/sitelayer
      APP_TIER: local
      ACTIVE_COMPANY_SLUG: la-operations
      ACTIVE_USER_ID: demo-user
      ALLOWED_ORIGINS: http://localhost:3000,http://localhost:5173
      AUTH_ALLOW_HEADER_FALLBACK: '1'
      PORT: '3001'
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 22
          cache: npm

      - name: Install postgres client
        run: |
          sudo apt-get update
          sudo apt-get install -y postgresql-client

      - run: npm ci

      - name: Apply database migrations
        run: bash scripts/migrate-db.sh

      - name: Build API and dependencies
        run: |
          npm run build --workspace @sitelayer/config
          npm run build --workspace @sitelayer/domain
          npm run build --workspace @sitelayer/logger
          npm run build --workspace @sitelayer/queue
          npm run build --workspace @sitelayer/workflows
          npm run build --workspace @sitelayer/api

      - name: Start API server
        run: |
          npm run start --workspace @sitelayer/api > /tmp/api.log 2>&1 &
          echo $! > /tmp/api.pid

      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -fsS http://localhost:3001/health > /dev/null; then
              echo "API healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "API failed to come up; logs:"
          cat /tmp/api.log
          exit 1

      - name: Run integration tests
        env:
          RUN_API_INTEGRATION: '1'
        run: npm run test --workspace @sitelayer/api

      - name: Capture API logs on failure
        if: failure()
        run: cat /tmp/api.log || true

      - name: Stop API server
        if: always()
        run: |
          if [ -f /tmp/api.pid ]; then
            kill "$(cat /tmp/api.pid)" 2>/dev/null || true
          fi
