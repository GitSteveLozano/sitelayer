name: Preview Stack GC

# Daily garbage collection of stale `sitelayer-pr-*` docker compose stacks
# on the preview droplet. Runs on the self-hosted preview runner — the
# preview droplet's port 22 is firewalled to the private 10.118.0.0/16
# network only, so a hosted ubuntu-latest runner can't reach it. The
# 2GB swap added to the droplet (see docs/PREVIEW_DEPLOYMENTS.md) prevents the OOM
# condition that originally motivated routing this off-runner.
on:
  schedule:
    - cron: '17 3 * * *'
  workflow_dispatch:
    inputs:
      allow_empty_open_prs:
        description: >-
          Bypass the empty-open-PR safety belt. Only set true on a manual
          run when you have independently verified that zero open PRs is
          legitimate (not a GitHub API hiccup), e.g. a post-batch-merge
          cleanup. The scheduled run never sets this.
        type: boolean
        required: false
        default: false

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: preview-gc
  cancel-in-progress: false

jobs:
  gc:
    runs-on: [self-hosted, sitelayer-preview]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: List open PR numbers
        id: open_prs
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        run: |
          set -euo pipefail
          # Use the GitHub REST API directly — `gh` CLI isn't installed on the
          # self-hosted runner. Failing loud is critical: if this step returns
          # an empty list when PRs are actually open, the reaper deletes
          # everything (which is exactly what happened on workflow run
          # 24935177139, where `gh` was missing and the silenced `||true`
          # masked it). Pages through ?page= to handle >100 open PRs.
          open_csv=""
          page=1
          while :; do
            response="$(curl --fail --silent --show-error \
              -H "Accept: application/vnd.github+json" \
              -H "Authorization: Bearer $GH_TOKEN" \
              -H "X-GitHub-Api-Version: 2022-11-28" \
              "https://api.github.com/repos/$GH_REPO/pulls?state=open&per_page=100&page=$page")"
            chunk="$(printf '%s' "$response" | jq -r 'map(.number) | join(",")')"
            if [ -z "$chunk" ]; then
              break
            fi
            if [ -n "$open_csv" ]; then
              open_csv="$open_csv,$chunk"
            else
              open_csv="$chunk"
            fi
            count="$(printf '%s' "$response" | jq 'length')"
            if [ "$count" -lt 100 ]; then
              break
            fi
            page=$((page + 1))
          done
          echo "csv=${open_csv}" >>"$GITHUB_OUTPUT"
          echo "Open PRs: ${open_csv:-<none>}"

      - name: Reap stale preview stacks (local)
        env:
          OPEN_PRS_CSV: ${{ steps.open_prs.outputs.csv }}
          # Forwarded only when an operator explicitly toggles the
          # workflow_dispatch input. Scheduled runs leave this unset so
          # the safety belt in scripts/preview-gc-remote.sh still fires
          # if the upstream PR-list query hiccups.
          OPEN_PRS_ALLOW_EMPTY: ${{ (github.event_name == 'workflow_dispatch' && inputs.allow_empty_open_prs) && '1' || '' }}
        run: |
          set -euo pipefail
          # The runner already lives on the preview droplet, so the reaper
          # is just a local bash script invocation. No SSH hop needed.
          bash scripts/preview-gc-remote.sh
