name: Deploy Demo

# Persistent demo environment at https://demo.preview.sitelayer.sandolab.xyz.
#
# Mirrors the dev tier (deploy-dev.yml): a long-running named stack
# (`sitelayer-demo`) on the preview droplet that tracks the `demo` branch and
# targets the dedicated `sitelayer_demo` database. The deltas vs dev are only
# tier=demo, db=sitelayer_demo, host=demo.preview.sitelayer.sandolab.xyz, and
# the shared env file. The hostname already resolves via the existing
# *.preview.sitelayer.sandolab.xyz wildcard at 159.203.53.218 (no DNS change),
# and Traefik issues TLS via the same letsencrypt cert resolver as dev.
# See docs/DEMO_ENVIRONMENT.md for the full operational contract.

on:
  push:
    branches: [demo]
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref to deploy (defaults to current demo branch)
        required: false
      mode:
        description: dev (watch-mode, fast) or prod (full bundle build)
        required: false
        default: dev

permissions:
  contents: read

concurrency:
  group: deploy-demo
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: [self-hosted, sitelayer-preview]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ inputs.ref || github.sha }}

      - name: Deploy demo stack
        env:
          PREVIEW_SLUG: demo
          PREVIEW_HOST: demo.preview.sitelayer.sandolab.xyz
          PREVIEW_TIER: demo
          PREVIEW_SHARED_ENV: /app/previews/.env.demo.shared
          PREVIEW_MODE: ${{ inputs.mode || 'dev' }}
          PREVIEW_SOURCE_DIR: ${{ github.workspace }}
          # The preview/demo host is not guaranteed to be on the Tailnet, so do
          # not hardcode mesh-hetzner here. Set this repository variable only
          # when the value is reachable from inside the demo worker container.
          MESH_WORK_REQUEST_DISPATCH_URL: ${{ vars.DEMO_MESH_WORK_REQUEST_DISPATCH_URL || '' }}
          MESH_WORK_REQUEST_DISPATCH_TOKEN: ${{ secrets.DEMO_MESH_WORK_REQUEST_DISPATCH_TOKEN || secrets.MESH_WORK_REQUEST_DISPATCH_TOKEN }}
          WORK_REQUEST_CALLBACK_TOKEN_TTL_HOURS: '72'
          WORK_REQUEST_REVIEW_STALE_HOURS: '48'
          WORK_REQUEST_AGENT_STALE_HOURS: '24'
          WORK_REQUEST_STALE_SWEEP_INTERVAL_MS: '300000'
          WORK_REQUEST_STALE_SWEEP_LIMIT: '25'
          NOTIFICATIONS_ENABLED: '0'
          # Workers are enabled on demo so QBO sync, context handoff dispatch,
          # and stale sweeps can be exercised against the persistent demo DB.
          # Notification delivery stays disabled unless Clerk is configured.
          PREVIEW_ENABLE_WORKER: '1'
          # The pre-flight orphan reap targets `sitelayer-pr-*` only, so the
          # `sitelayer-demo` stack is unaffected. Skip the reap anyway since
          # the daily preview-gc.yml workflow is the durable backstop and
          # this job doesn't need to fetch the open-PR list.
          PREVIEW_DEPLOY_SKIP_REAP: '1'
        run: scripts/deploy-preview.sh

      # Seed the curated steve-demo company into sitelayer_demo. Idempotent
      # (every row keys on a deterministic ref-hashed UUID + inserts ON CONFLICT
      # DO NOTHING), so running it on every demo deploy is a no-op once seeded —
      # no reset required for steady state. The seeder self-guards: it refuses
      # APP_TIER=prod and the `steve-demo` slug passes COMPANY_SLUG_PATTERN.
      # Runs AFTER the deploy so migrations have already created the gap tables.
      #
      # DATABASE_URL / SSL come from the same operator-written shared env file
      # the demo containers use (/app/previews/.env.demo.shared) — the seed
      # writes to the same DB the stack reads, with no duplicated GitHub secret.
      - name: Seed demo data
        if: success()
        env:
          APP_TIER: demo
          PREVIEW_SHARED_ENV: /app/previews/.env.demo.shared
        run: |
          set -euo pipefail
          if [ ! -f "$PREVIEW_SHARED_ENV" ]; then
            echo "ERROR: shared demo env missing at $PREVIEW_SHARED_ENV — cannot seed" >&2
            exit 1
          fi
          # Pull DATABASE_URL (+ optional SSL toggle) from the shared env file
          # without exporting the entire file into this step's environment.
          DATABASE_URL="$(grep -E '^DATABASE_URL=' "$PREVIEW_SHARED_ENV" | head -1 | cut -d= -f2-)"
          DATABASE_SSL_REJECT_UNAUTHORIZED="$(grep -E '^DATABASE_SSL_REJECT_UNAUTHORIZED=' "$PREVIEW_SHARED_ENV" | head -1 | cut -d= -f2- || true)"
          if [ -z "$DATABASE_URL" ]; then
            echo "ERROR: DATABASE_URL not found in $PREVIEW_SHARED_ENV" >&2
            exit 1
          fi
          export DATABASE_URL
          export DATABASE_SSL_REJECT_UNAUTHORIZED="${DATABASE_SSL_REJECT_UNAUTHORIZED:-false}"
          npm ci
          npm run seed:demo
