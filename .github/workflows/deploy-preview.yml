name: Deploy Preview

on:
  pull_request:
    types: [opened, synchronize, reopened, closed, labeled, unlabeled]
  workflow_dispatch:
    inputs:
      slug:
        description: Safe preview slug, for example feature-qbo-ui
        required: true
      ref:
        description: Git ref to deploy
        required: false
      mode:
        description: dev (watch-mode, fast) or prod (full bundle build)
        required: false
        default: dev

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: preview-${{ github.event_name == 'pull_request' && github.event.pull_request.number || inputs.slug }}
  cancel-in-progress: true

jobs:
  deploy:
    if: github.event_name != 'pull_request' || (github.event.action != 'closed' && github.event.pull_request.head.repo.full_name == github.repository)
    runs-on: [self-hosted, sitelayer-preview]
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || inputs.ref || github.sha }}

      - name: Collect open PR numbers (for pre-flight orphan reap)
        id: open_prs
        env:
          GH_TOKEN: ${{ github.token }}
          GH_REPO: ${{ github.repository }}
        continue-on-error: true
        run: |
          set -euo pipefail
          csv="$(gh pr list --state open --limit 500 --json number \
            --jq 'map(.number) | join(",")' 2>/dev/null || true)"
          echo "csv=${csv}" >>"$GITHUB_OUTPUT"
          echo "Open PRs: ${csv:-<none>}"

      - name: Deploy preview stack
        env:
          PREVIEW_SLUG: ${{ github.event_name == 'pull_request' && format('pr-{0}', github.event.pull_request.number) || inputs.slug }}
          PREVIEW_SOURCE_DIR: ${{ github.workspace }}
          # Dev-mode (source-mounted tsx/vite watch) by default. Add the
          # `preview-prod` label to the PR to force a full prod-bundle build.
          PREVIEW_MODE: ${{ (github.event_name == 'pull_request' && contains(github.event.pull_request.labels.*.name, 'preview-prod')) && 'prod' || (inputs.mode || 'dev') }}
          # Hand the pre-flight orphan-reap pass an authoritative open-PR list
          # without relying on `gh` being authenticated on the preview droplet.
          PREVIEW_OPEN_PRS: ${{ steps.open_prs.outputs.csv }}
        run: scripts/deploy-preview.sh

      - name: Comment preview URL
        if: github.event_name == 'pull_request'
        continue-on-error: true
        uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9.0.0
        with:
          script: |
            const marker = '<!-- sitelayer-preview-url -->'
            const previewUrl = `https://pr-${context.payload.pull_request.number}.preview.sitelayer.sandolab.xyz`
            const body = `${marker}\nPreview deployment: ${previewUrl}`
            const { owner, repo } = context.repo
            const issue_number = context.payload.pull_request.number
            const comments = await github.paginate(github.rest.issues.listComments, {
              owner,
              repo,
              issue_number,
              per_page: 100,
            })
            const existing = comments.find((comment) => comment.user?.type === 'Bot' && comment.body?.includes(marker))
            if (existing) {
              await github.rest.issues.updateComment({ owner, repo, comment_id: existing.id, body })
            } else {
              await github.rest.issues.createComment({ owner, repo, issue_number, body })
            }

  cleanup:
    if: github.event_name == 'pull_request' && github.event.action == 'closed' && github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, sitelayer-preview]
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Cleanup preview stack
        env:
          PREVIEW_SLUG: pr-${{ github.event.pull_request.number }}
        run: scripts/cleanup-preview.sh
