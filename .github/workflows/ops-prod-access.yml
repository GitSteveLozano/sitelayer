name: Ops Prod Access

# One-shot bootstrap: authorize an operator/fleet SSH public key on the prod
# deploy user, using the CI runner (which already holds DEPLOY_SSH_KEY) as the
# bridge. After this, deploys/ops can run directly from the fleet over SSH and
# this workflow (and the rest of GitHub Actions) can be retired.
on:
  workflow_dispatch:
    inputs:
      pubkey:
        description: SSH public key to authorize on the prod deploy user (sitelayer@prod)
        required: true

permissions:
  contents: read

concurrency:
  group: ops-prod-access

jobs:
  bootstrap:
    runs-on: [self-hosted, sitelayer-preview]
    environment:
      name: production
    steps:
      - name: Authorize fleet key on prod
        env:
          DEPLOY_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
          DEPLOY_USER: sitelayer
          PUBKEY: ${{ inputs.pubkey }}
        run: |
          set -euo pipefail
          test -n "$DEPLOY_KEY" || { echo "DEPLOY_SSH_KEY not configured"; exit 1; }
          test -n "$DEPLOY_HOST" || { echo "DEPLOY_HOST not configured"; exit 1; }
          test -n "$PUBKEY" || { echo "pubkey input required"; exit 1; }
          mkdir -p ~/.ssh
          printf '%s\n' "$DEPLOY_KEY" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          trap 'rm -f ~/.ssh/deploy_key' EXIT
          ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts 2>/dev/null || true
          printf '%s\n' "$PUBKEY" | ssh -i ~/.ssh/deploy_key -o BatchMode=yes "$DEPLOY_USER@$DEPLOY_HOST" \
            'k=$(cat); install -d -m 700 ~/.ssh; touch ~/.ssh/authorized_keys; chmod 600 ~/.ssh/authorized_keys; grep -qxF "$k" ~/.ssh/authorized_keys || printf "%s\n" "$k" >> ~/.ssh/authorized_keys; echo KEY_DONE; grep -c . ~/.ssh/authorized_keys'
