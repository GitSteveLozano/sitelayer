<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>SiteLayer</title>
    <script>
      // GitHub Pages SPA redirect — preserves path + query for client-side routing
      var base = '/sitelayer/';
      var l = window.location;
      sessionStorage.redirect = l.pathname.slice(base.length) + l.search + l.hash;
      l.replace(base);
    </script>
  </head>
  <body></body>
</html>
